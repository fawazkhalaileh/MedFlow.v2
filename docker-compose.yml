version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medflow-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/apache/vhost.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - medflow

  db:
    image: mysql:8.0
    container_name: medflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: medflow
      MYSQL_USER: medflow
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usecret", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medflow

  node:
    image: node:20-alpine
    container_name: medflow-node
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev
    networks:
      - medflow

volumes:
  db_data:
    driver: local

networks:
  medflow:
    driver: bridge
